<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YazdanInfo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 30px;
        }

        .bio {
            font-size: 1em;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .js-badge {
            font-size: 0.9em;
            color: #f7df1e;
            font-weight: bold;
            margin: 20px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }

        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .links a {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .links a:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            .subtitle {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>YazdanInfo</h1>
        <p class="subtitle">Welcome to my website</p>
        
        <p class="bio">
            Hi! I'm YazdanInfo. This is my personal website. Feel free to explore and get in touch!
        </p>

        <div class="js-badge">
            🚀 Powered by JavaScript - This site is built with pure HTML, CSS, and JavaScript!
        </div>

        <div class="links">
            <a href="https://github.com/YazdanInfo" target="_blank">GitHub</a>
            <a href="https://twitter.com" target="_blank">Twitter</a>
            <a href="mailto:your-email@example.com">Email</a>
        </div>

        <div class="footer">
            <p>&copy; 2024 YazdanInfo. All rights reserved.</p>
        </div>
    </div>

    <script>
        // Simple welcome message
        console.log('Welcome to YazdanInfo website!');

        // Add click animations
        document.querySelectorAll('.links a').forEach(link => {
            link.addEventListener('click', function(e) {
                console.log('Navigating to: ' + this.href);
            });
        });

        // Add dynamic greeting based on time of day
        const hour = new Date().getHours();
        let greeting = 'Hello';
        if (hour < 12) greeting = 'Good morning';
        else if (hour < 18) greeting = 'Good afternoon';
        else greeting = 'Good evening';
        
        console.log(greeting + '!');

        // JavaScript detection - Shows this site uses JavaScript
        console.log('✨ This website proudly uses JavaScript for interactivity!');
        document.addEventListener('DOMContentLoaded', function() {
            console.log('JavaScript is running successfully on this page!');
        });
    </script>
</body>
</html>
