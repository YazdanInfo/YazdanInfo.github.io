<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ember: #ff2a00;
    --neon:  #00ff88;
    --blue:  #7eb8f7;
    --bg:    #050202;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    font-family: "Inter", system-ui, sans-serif;
    color: #e8e8e8;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow-x: hidden;
  }

  .ember-glow {
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 680px;
    height: 55vh;
    background: radial-gradient(ellipse at top, rgba(255,42,0,.14) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .cool-glow {
    position: fixed;
    bottom: -20%; right: -15%;
    width: 55%; height: 50%;
    border-radius: 50%;
    background: rgba(126,184,247,.03);
    filter: blur(130px);
    pointer-events: none;
    z-index: 0;
  }

  main {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 72px 20px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .avatar-wrap {
    position: relative;
    margin-bottom: 24px;
  }
  .avatar-ember {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: var(--ember);
    filter: blur(40px);
    opacity: .35;
  }
  .avatar-ring {
    position: relative;
    padding: 3px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,.35) 0%, rgba(255,255,255,.04) 100%);
    box-shadow: 0 0 22px rgba(255,255,255,.08);
  }
  .avatar-ring img {
    display: block;
    width: 112px; height: 112px;
    border-radius: 50%;
    object-fit: cover;
    filter: brightness(.9) contrast(1.1);
    position: relative;
    z-index: 1;
  }

  h1 {
    font-size: 1.9rem;
    font-weight: 900;
    letter-spacing: -.02em;
    background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,.6) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 12px rgba(255,42,0,.35));
    margin-bottom: 12px;
  }

  .handle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    border-radius: 6px;
    background: rgba(0,0,0,.55);
    border: 1px solid rgba(0,255,136,.2);
    box-shadow: 0 0 14px rgba(0,255,136,.07);
    margin-bottom: 28px;
    direction: ltr;
  }
  .handle span {
    font-family: "JetBrains Mono", monospace;
    font-size: .85rem;
    color: var(--neon);
    letter-spacing: .06em;
  }
  .cursor {
    display: inline-block;
    width: 7px; height: 14px;
    background: var(--neon);
    box-shadow: 0 0 6px var(--neon);
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0; }
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 40px;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: .75rem;
    font-weight: 600;
    color: rgba(255,255,255,.55);
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding-bottom: 16px;
  }

  .b-github    { --bc: #e0e0e0; }
  .b-telegram  { --bc: #26A5E4; }
  .b-instagram { --bc: #E1306C; }
  .b-xbox      { --bc: #52b043; }
  .b-soroush   { --bc: var(--neon); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-radius: 18px;
    text-decoration: none;
    overflow: hidden;
    background: rgba(20,8,8,.75);
    border: 1px solid rgba(255,255,255,.06);
    border-top-color: rgba(255,255,255,.11);
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
    opacity: 0;
    animation: fadeUp .55s cubic-bezier(.16,1,.3,1) forwards;
    -webkit-tap-highlight-color: transparent;
    transition: background .25s ease, border-color .25s ease;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 2px;
    background: var(--bc);
    box-shadow: 0 0 8px var(--bc), 0 0 18px var(--bc);
    opacity: .45;
    border-radius: 2px 0 0 2px;
    transition: width .25s ease, opacity .25s ease;
  }

  .card::after {
    content: "";
    position: absolute;
    top: 0; right: 0;
    width: 7px; height: 7px;
    border-top: 1px solid rgba(255,255,255,.12);
    border-right: 1px solid rgba(255,255,255,.12);
    border-radius: 0 6px 0 0;
    transition: border-color .25s ease;
  }

  @media (hover: hover) {
    .card:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.12); }
    .card:hover::before { width: 3px; opacity: .9; box-shadow: 0 0 12px var(--bc), 0 0 28px var(--bc); }
    .card:hover::after { border-color: var(--bc); }
    .card:hover .icon { color: var(--bc); }
  }
  .card:active { background: rgba(255,255,255,.04); }

  .icon-wrap {
    width: 44px; height: 44px;
    border-radius: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.06);
  }
  .icon {
    font-size: 1.2rem;
    color: rgba(255,255,255,.5);
    transition: color .25s ease;
  }

  .card-text {
    flex: 1;
    text-align: left;
    min-width: 0;
  }
  .card-label {
    font-weight: 700;
    font-size: .875rem;
    color: rgba(255,255,255,.85);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color .25s ease;
  }
  .card-handle {
    font-family: "JetBrains Mono", monospace;
    font-size: .7rem;
    color: rgba(255,255,255,.3);
    margin-top: 3px;
    direction: ltr;
    display: block;
    transition: color .25s ease;
  }

  footer {
    position: relative;
    z-index: 1;
    width: 100%;
    padding: 32px 0 28px;
    text-align: center;
    font-family: "JetBrains Mono", monospace;
    font-size: .6rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(255,255,255,.18);
  }
  footer .neon { color: rgba(0,255,136,.55); }

  /* Language switcher */
  .lang-btn {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 100;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 8px;
    background: rgba(20,8,8,.85);
    border: 1px solid rgba(255,255,255,.12);
    color: rgba(255,255,255,.8);
    font-family: "Inter", system-ui, sans-serif;
    font-size: .8rem;
    font-weight: 600;
    text-decoration: none;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 2px 14px rgba(0,0,0,.4);
    transition: background .2s, border-color .2s, color .2s;
    white-space: nowrap;
  }
  .lang-btn:hover {
    background: rgba(255,255,255,.08);
    border-color: rgba(0,255,136,.35);
    color: #fff;
  }
</style>
</head>
