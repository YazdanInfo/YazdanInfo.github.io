    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: rgba(255, 255, 255, 0.06);
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.4);
            --accent2: #a29bfe;
            --gradient: linear-gradient(135deg, #6c5ce7, #a29bfe, #6c5ce7);
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-hover: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated grid background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .grid-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(108, 92, 231, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108, 92, 231, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
            animation: float 12s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #a29bfe;
            bottom: -80px;
            left: -80px;
            animation-delay: -6s;
            opacity: 0.3;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: #6c5ce7;
            top: 50%;
            left: 50%;
            animation-delay: -3s;
            opacity: 0.25;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(-30px, -20px) scale(1.03); }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 30px;
            max-width: 600px;
            width: 100%;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent2);
            margin-bottom: 35px;
            backdrop-filter: blur(20px);
            animation: badgePulse 3s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 0 20px rgba(108, 92, 231, 0.15); }
            50% { box-shadow: 0 0 40px rgba(108, 92, 231, 0.35); }
        }

        .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00e676;
            animation: dotBlink 1.5s ease-in-out infinite;
        }

        @keyframes dotBlink {
            0%, 100% { opacity: 1; box-shadow: 0 0 6px #00e676; }
            50% { opacity: 0.5; box-shadow: 0 0 2px #00e676; }
        }

        /* Glitch text effect for title */
        .title-wrapper {
            position: relative;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 3.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            display: inline-block;
            animation: shimmer 3s ease-in-out infinite;
            background-size: 200% 200%;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Glitch slices */
        .title-wrapper::before,
        .title-wrapper::after {
            content: 'YAZDAN';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            pointer-events: none;
        }

        .title-wrapper::before {
            animation: glitch1 5s infinite;
            clip-path: inset(20% 0 50% 0);
        }

        .title-wrapper::after {
            animation: glitch2 5s infinite;
            clip-path: inset(60% 0 10% 0);
        }

        @keyframes glitch1 {
            0%, 90%, 100% { opacity: 0; transform: translate(0); }
            92% { opacity: 0.4; transform: translate(-3px, 1px); }
            94% { opacity: 0; transform: translate(0); }
        }

        @keyframes glitch2 {
            0%, 90%, 100% { opacity: 0; transform: translate(0); }
            93% { opacity: 0.3; transform: translate(3px, -1px); }
            95% { opacity: 0; transform: translate(0); }
        }

        /* Persian name */
        .persian-name {
            font-size: 1.3rem;

            margin-bottom: 8px;
            font-weight: 400;

            letter-spacing: 0.5px;

        /* Terminal line */
        .terminal-line {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;

            color: #a29bfe;
        }

        .terminal-line .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #a29bfe;
            animation: cursorBlink 1s step-end infinite;
            vertical-align: middle;
        }

        /* Social cards */
        .social-grid {
            display: flex;

            gap: 12px;
            max-width: 380px;
            margin: 0 auto;

        .social-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 20px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .social-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(108, 92, 231, 0.08), transparent);
            transition: left 0.5s ease;
        }

        .social-card:hover {
            border-color: rgba(108, 92, 231, 0.4);
            background: var(--card-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(108, 92, 231, 0.15), 0 0 0 1px rgba(108, 92, 231, 0.1) inset;
        }

        .social-card:hover::before {
            left: 100%;
        }

        .social-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .tg { background: rgba(0, 136, 204, 0.2); color: #2AABEE; }
        .gh { background: rgba(108, 92, 231, 0.2); color: #a29bfe; }
        .ig { background: rgba(225, 48, 108, 0.2); color: #E1306C; }

        .social-info {
            text-align: left;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .social-platform {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 3px;
        }

        .social-handle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .social-arrow {
            font-size: 1rem;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .social-card:hover .social-arrow {
            color: var(--accent2);
            transform: translateX(4px);
        }

        /* Footer */
        .footer {
            margin-top: 35px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .footer .heart {
            color: #E1306C;
            animation: heartBeat 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2); }
            50% { transform: scale(1); }
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent2);
            border-radius: 50%;
            animation: particleFloat 8s linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 2.6rem; }
            .container { padding: 30px 20px; }
            .social-card { padding: 14px 16px; }
            .social-icon { width: 38px; height: 38px; font-size: 1.1rem; }
            .persian-name { font-size: 1.1rem; }
        }
    </style>
</head>

    <!-- Particle script -->
    <script>
        const particlesContainer = document.getElementById('particles');
        const particleCount = 30;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (Math.random() * 6 + 6) + 's';
            particle.style.width = (Math.random() * 2 + 1) + 'px';
            particle.style.height = particle.style.width;
            particle.style.opacity = Math.random() * 0.5 + 0.1;
            particlesContainer.appendChild(particle);
        }
    </script>
